<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA 02</title>

    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
</head>
<body>

    <h1>Desafio da imagem</h1>
    <br>
    <img src="gato.avif" width="15%" alt="gato">

    <br>
    <br>
    <figure>
        <img src="pao de queijo.jpg" width="20%" alt="pao de queijo">
        <figcaption> O melhor pão de queijo</figcaption>
    </figure>
    <br>
    <br>
    <hr>
    <picture>
    <source media="(max-width: 30% )" srcset="netflix.png" width="30%">
    <img src="netflix.png" alt="netflix" width="30%">
    </picture>


    
</body>
</html>
